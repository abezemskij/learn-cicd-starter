name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Setup toolchain
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Build Prod Script
        run: ./scripts/buildprod.sh

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/project-5176a17d-0fcf-4836-bb5/notely-ar-repo/notely:latest .

      - name: Run database migrations
        run: ./scripts/migrateup.sh

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/project-5176a17d-0fcf-4836-bb5/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project project-5176a17d-0fcf-4836-bb5 --max-instances=4
